<!doctype html>
<html lang="en">
  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-QX_2HmKqprCNDVXLB3OGm.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root {
        --bg-top: #1b2f8a; /* royal blue */
        --bg-bottom: #060b26; /* deep navy */
        --fg: #ffffff; /* white */
        --rain: rgba(174, 194, 255, 0.55);
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
        background-attachment: fixed;
        color: var(--fg) !important;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      /* Rain canvas sits behind the content and never intercepts clicks. */
      #rain {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }
      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        width: 100%;
        display: grid;
        grid-template-rows: 1fr auto 0.75fr auto 1fr;
        place-items: center;
      }
      .header {
        grid-row: 2;
        display: grid;
        justify-items: center;
        gap: 0.75rem;
      }
      .header img {
        width: 96px;
        height: 96px;
      }
      .brand {
        font-weight: 700;
        letter-spacing: 0.02em;
        opacity: 0.9;
      }
      .more {
        appearance: none;
        border: 2px solid #ffffff;
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        padding: 0.75rem 1.25rem;
        border-radius: 999px;
        font-weight: 800;
        font-size: 1rem;
        cursor: pointer;
      }
      .more:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      .more:active {
        transform: translateY(1px);
      }
      .quote {
        grid-row: 4;
        max-width: 70ch;
        padding: 2rem;
        text-align: center;
        /* Force the quote color even if a browser/extension injects styles */
        color: #ffffff !important;
        font-weight: 800;
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        line-height: 1.35;
        /* Reserve vertical space so the typewriter loop doesn't jump the layout
           as the line wraps/unwraps. */
        min-height: 2.7em;
      }
      /* Blinking typewriter caret appended after the animated text. */
      .caret {
        display: inline-block;
        margin-left: 0.06em;
        font-weight: 400;
        color: #ffffff;
        animation: caret-blink 1s steps(1, end) infinite;
      }
      @keyframes caret-blink {
        0%,
        50% {
          opacity: 1;
        }
        50.01%,
        100% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="rain" aria-hidden="true"></canvas>
    <div class="page">
      <header class="header">
        <img src="/static/favicon.png?v=2" alt="SnarkyAPI" />
        <div class="brand">SnarkyAPI by Oliver Ernster</div>
        <button class="more" id="more-snark" type="button">
          More snark please!
        </button>
      </header>

      <main class="quote" id="quote">{{ quote }}</main>
    </div>

    <script>
      // Typewriter loop: type the quote out left-to-right, pause, wipe, repeat.
      // The "More snark please!" button fetches a fresh quote; the loop swaps it
      // in on its next wipe so we never mutate the text mid-line. Only one
      // request is ever in flight (prevents hammering the API).
      (() => {
        const quoteEl = document.getElementById('quote')
        const button = document.getElementById('more-snark')
        if (!quoteEl) return

        // Per-character and pause timings (ms).
        const TYPE_MS = 55
        const DELETE_MS = 28
        const PAUSE_FULL_MS = 1900
        const PAUSE_EMPTY_MS = 450

        const reduce = window.matchMedia(
          '(prefers-reduced-motion: reduce)'
        ).matches

        let fullText = (quoteEl.textContent || '').trim()
        let pendingText = null

        // Drive text through a stable text node so the caret element persists.
        const textNode = document.createTextNode('')
        const render = (str) => {
          textNode.nodeValue = str
        }

        // --- Fetch: single in-flight request, abortable, no caching. ---
        let inFlight = false
        let controller = null
        async function loadNextQuote() {
          if (inFlight) return
          inFlight = true
          if (button) {
            button.disabled = true
            button.setAttribute('aria-busy', 'true')
          }
          try {
            if (controller) controller.abort()
            controller = new AbortController()
            const res = await fetch('/api/v1/sarcasm/', {
              method: 'GET',
              cache: 'no-store',
              signal: controller.signal,
              headers: { Accept: 'text/plain' },
            })
            if (!res.ok) throw new Error(`HTTP ${res.status}`)
            const text = (await res.text()).trim()
            if (reduce) {
              fullText = text
              render(text)
            } else {
              // Queue it; the loop types it after the current wipe.
              pendingText = text
            }
          } catch (e) {
            console.warn('Failed to load quote:', e)
          } finally {
            inFlight = false
            if (button) {
              button.disabled = false
              button.removeAttribute('aria-busy')
            }
          }
        }
        if (button) button.addEventListener('click', loadNextQuote)

        // Reduced motion: show the full static quote, no typing animation.
        if (reduce) {
          quoteEl.textContent = ''
          quoteEl.appendChild(textNode)
          render(fullText)
          return
        }

        // Build: [ text node ][ blinking caret ].
        const caret = document.createElement('span')
        caret.className = 'caret'
        caret.setAttribute('aria-hidden', 'true')
        caret.textContent = '▋' // ▋
        quoteEl.textContent = ''
        quoteEl.appendChild(textNode)
        quoteEl.appendChild(caret)

        let phase = 'typing'
        let i = 0

        function tick() {
          if (phase === 'typing') {
            i += 1
            render(fullText.slice(0, i))
            if (i >= fullText.length) {
              phase = 'pausing'
              setTimeout(tick, PAUSE_FULL_MS)
            } else {
              setTimeout(tick, TYPE_MS)
            }
          } else if (phase === 'pausing') {
            phase = 'deleting'
            setTimeout(tick, DELETE_MS)
          } else {
            i -= 1
            render(fullText.slice(0, Math.max(i, 0)))
            if (i <= 0) {
              if (pendingText !== null) {
                fullText = pendingText
                pendingText = null
              }
              phase = 'typing'
              i = 0
              setTimeout(tick, PAUSE_EMPTY_MS)
            } else {
              setTimeout(tick, DELETE_MS)
            }
          }
        }

        render('')
        setTimeout(tick, PAUSE_EMPTY_MS)
      })()
    </script>

    <script>
      // Lightweight canvas rain behind the content. Honours reduced-motion.
      (() => {
        const canvas = document.getElementById('rain')
        if (!canvas) return

        const prefersReducedMotion = window.matchMedia(
          '(prefers-reduced-motion: reduce)'
        ).matches
        if (prefersReducedMotion) return

        const ctx = canvas.getContext('2d')

        const DROP_COUNT = 170
        const MIN_LENGTH = 8
        const MAX_LENGTH = 22
        const MIN_SPEED = 4
        const MAX_SPEED = 12
        const SLANT = 1.3 // horizontal drift, gives the rain a slight lean
        const LINE_WIDTH = 1.1
        const DROP_COLOR =
          getComputedStyle(document.documentElement)
            .getPropertyValue('--rain')
            .trim() || 'rgba(174, 194, 255, 0.55)'

        let width = 0
        let height = 0
        let drops = []

        const rand = (min, max) => min + Math.random() * (max - min)

        const makeDrop = () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          len: rand(MIN_LENGTH, MAX_LENGTH),
          speed: rand(MIN_SPEED, MAX_SPEED),
        })

        function resize() {
          const dpr = window.devicePixelRatio || 1
          width = canvas.clientWidth
          height = canvas.clientHeight
          canvas.width = width * dpr
          canvas.height = height * dpr
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
          drops = Array.from({ length: DROP_COUNT }, makeDrop)
        }

        function frame() {
          ctx.clearRect(0, 0, width, height)
          ctx.strokeStyle = DROP_COLOR
          ctx.lineWidth = LINE_WIDTH
          ctx.lineCap = 'round'
          for (const d of drops) {
            ctx.beginPath()
            ctx.moveTo(d.x, d.y)
            ctx.lineTo(d.x + SLANT, d.y + d.len)
            ctx.stroke()
            d.x += SLANT * (d.speed / MAX_SPEED)
            d.y += d.speed
            if (d.y > height) {
              d.y = -d.len
              d.x = Math.random() * width
            }
          }
          requestAnimationFrame(frame)
        }

        window.addEventListener('resize', resize)
        resize()
        requestAnimationFrame(frame)
      })()
    </script>
  </body>
</html>
