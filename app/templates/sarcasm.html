    <style>
      :root {
        --bg-top: #1b2f8a; /* royal blue */
        --bg-bottom: #060b26; /* deep navy */
        --fg: #ffffff; /* white */
        --rain: rgba(174, 194, 255, 0.55);
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
        background-attachment: fixed;
        color: var(--fg) !important;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      /* Rain canvas sits behind the content and never intercepts clicks. */
      #rain {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }
      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        width: 100%;
        display: grid;
        grid-template-rows: 1fr auto 0.75fr auto 1fr;
        place-items: center;
      }
      .header {
        grid-row: 2;
        display: grid;
        justify-items: center;
        gap: 0.75rem;
      }
      .header img {
        width: 96px;
        height: 96px;
      }
      .brand {
        font-weight: 700;
        letter-spacing: 0.02em;
        opacity: 0.9;
      }
      .quote {
        grid-row: 4;
        max-width: 70ch;
        padding: 2rem;
        text-align: center;
        /* Force the quote color even if a browser/extension injects styles */
        color: #ffffff !important;
        font-weight: 800;
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        line-height: 1.35;
        /* Reserve vertical space so the typewriter loop doesn't jump the layout
           as the line wraps/unwraps. */
        min-height: 2.7em;
      }
      /* Blinking typewriter caret appended after the animated text. */
      .caret {
        display: inline-block;
        margin-left: 0.06em;
        font-weight: 400;
        color: #ffffff;
        animation: caret-blink 1s steps(1, end) infinite;
      }
      @keyframes caret-blink {
        0%,
        50% {
          opacity: 1;
        }
        50.01%,
        100% {
          opacity: 0;
        }
      }
    </style>

  <body>
    <canvas id="rain" aria-hidden="true"></canvas>
    <div class="page">
      <header class="header">
        <img src="/static/favicon.png?v=2" alt="SnarkyAPI" />
        <div class="brand">SnarkyAPI by Oliver Ernster</div>
      </header>

      <main class="quote" id="quote">{{ quote }}</main>
    </div>

    <script>
      // Auto-rotating typewriter: type a snark left-to-right, hold for 5s, wipe,
      // then type a freshly-fetched snark, forever. The next snark is prefetched
      // during the hold so there's no gap. Only one request is ever in flight.
      (() => {
        const quoteEl = document.getElementById('quote')
        if (!quoteEl) return

        // Per-character and pause timings (ms).
        const TYPE_MS = 55
        const DELETE_MS = 28
        const HOLD_MS = 5000 // pause once fully typed
        const PAUSE_EMPTY_MS = 450 // brief beat between snarks

        // Initial text is the server-rendered {{ quote }}. If it is missing or
        // leaked through unrendered (e.g. the file was opened without the app),
        // ignore it and fetch a real snark rather than typing a raw placeholder.
        const looksUnrendered = (s) => !s || /\{\{[\s\S]*\}\}/.test(s)
        let fullText = (quoteEl.textContent || '').trim()
        if (looksUnrendered(fullText)) fullText = ''
        let pendingText = null

        // Drive text through a stable text node so the caret element persists.
        const textNode = document.createTextNode('')
        const render = (str) => {
          textNode.nodeValue = str
        }

        // --- Fetch a fresh snark into pendingText. Single in-flight, abortable. ---
        let inFlight = false
        let controller = null
        async function fetchNextSnark() {
          if (inFlight) return
          inFlight = true
          try {
            if (controller) controller.abort()
            controller = new AbortController()
            const res = await fetch('/api/v1/sarcasm/', {
              method: 'GET',
              cache: 'no-store',
              signal: controller.signal,
              headers: { Accept: 'text/plain' },
            })
            if (!res.ok) throw new Error(`HTTP ${res.status}`)
            const text = (await res.text()).trim()
            if (text) pendingText = text
          } catch (e) {
            console.warn('Failed to load snark:', e)
          } finally {
            inFlight = false
          }
        }

        // Build: [ text node ][ blinking caret ].
        const caret = document.createElement('span')
        caret.className = 'caret'
        caret.setAttribute('aria-hidden', 'true')
        caret.textContent = '▋' // ▋
        quoteEl.textContent = ''
        quoteEl.appendChild(textNode)
        quoteEl.appendChild(caret)

        let phase = 'typing'
        let i = 0

        function tick() {
          if (phase === 'typing') {
            i += 1
            render(fullText.slice(0, i))
            if (i >= fullText.length) {
              phase = 'holding'
              // Prefetch the next snark while we hold the finished line.
              fetchNextSnark()
              setTimeout(tick, HOLD_MS)
            } else {
              setTimeout(tick, TYPE_MS)
            }
          } else if (phase === 'holding') {
            phase = 'deleting'
            setTimeout(tick, DELETE_MS)
          } else {
            i -= 1
            render(fullText.slice(0, Math.max(i, 0)))
            if (i <= 0) {
              // Swap in the freshly-fetched snark (fall back to re-typing the
              // current one if the fetch hasn't landed yet).
              if (pendingText !== null) {
                fullText = pendingText
                pendingText = null
              }
              phase = 'typing'
              i = 0
              setTimeout(tick, PAUSE_EMPTY_MS)
            } else {
              setTimeout(tick, DELETE_MS)
            }
          }
        }

        render('')
        if (fullText) {
          setTimeout(tick, PAUSE_EMPTY_MS)
        } else {
          // No usable server text: fetch one first so we never show a blank
          // line or a raw placeholder, then start the loop.
          fetchNextSnark().then(() => {
            if (pendingText !== null) {
              fullText = pendingText
              pendingText = null
            }
            setTimeout(tick, PAUSE_EMPTY_MS)
          })
        }
      })()
    </script>

    <script>
      // Lightweight canvas rain behind the content. Always animates (the page's
      // motion is intentional), and naturally pauses when the tab is hidden.
      (() => {
        const canvas = document.getElementById('rain')
        if (!canvas) return

        const ctx = canvas.getContext('2d')

        const DROP_COUNT = 170
        const MIN_LENGTH = 8
        const MAX_LENGTH = 22
        const MIN_SPEED = 4
        const MAX_SPEED = 12
        const SLANT = 1.3 // horizontal drift, gives the rain a slight lean
        const LINE_WIDTH = 1.1
        const DROP_COLOR =
          getComputedStyle(document.documentElement)
            .getPropertyValue('--rain')
            .trim() || 'rgba(174, 194, 255, 0.55)'

        let width = 0
        let height = 0
        let drops = []

        const rand = (min, max) => min + Math.random() * (max - min)

        const makeDrop = () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          len: rand(MIN_LENGTH, MAX_LENGTH),
          speed: rand(MIN_SPEED, MAX_SPEED),
        })

        function resize() {
          const dpr = window.devicePixelRatio || 1
          width = canvas.clientWidth
          height = canvas.clientHeight
          canvas.width = width * dpr
          canvas.height = height * dpr
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
          drops = Array.from({ length: DROP_COUNT }, makeDrop)
        }

        function frame() {
          ctx.clearRect(0, 0, width, height)
          ctx.strokeStyle = DROP_COLOR
          ctx.lineWidth = LINE_WIDTH
          ctx.lineCap = 'round'
          for (const d of drops) {
            ctx.beginPath()
            ctx.moveTo(d.x, d.y)
            ctx.lineTo(d.x + SLANT, d.y + d.len)
            ctx.stroke()
            d.x += SLANT * (d.speed / MAX_SPEED)
            d.y += d.speed
            if (d.y > height) {
              d.y = -d.len
              d.x = Math.random() * width
            }
          }
          requestAnimationFrame(frame)
        }

        window.addEventListener('resize', resize)
        resize()
        requestAnimationFrame(frame)
      })()
    </script>
  </body>
